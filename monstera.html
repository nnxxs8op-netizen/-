
<!-- الصفحة التاسعة: صفحة تفاصيل نبتة المونستيرا -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>المونستيرا 🌱</title>

  
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      background-color: #dcd6d1;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      background: #f5f5f5;
      width: 650px;
      padding: 40px 60px;
      border-radius: 20px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 20px;
      color: #222;
    }

    p {
      color: #444;
      line-height: 2;
      margin: 8px 0;
      font-size: 15px;
    }

    strong {
      color: #222;
    }

    ul {
      list-style: disc;
      text-align: right;
      margin: 10px auto;
      width: fit-content;
      padding-right: 20px;
    }

    li {
      margin: 6px 0;
    }

    button {
      margin-top: 25px;
      padding: 10px 35px;
      border-radius: 12px;
      border: 2px solid #3c5f3c;
      background: transparent;
      color: #3c5f3c;
      font-family: 'Cairo', sans-serif;
      cursor: pointer;
      transition: 0.3s;
    }

    button:hover {
      background: #3c5f3c;
      color: white;
    }
  </style>
</head>

<body>

<div class="card">
  <h1>🌱 نبتة: المونستيرا</h1>

  <p><strong>الوصف:</strong> نبتة مميزة بأوراقها الفريدة، تعطي طابع عصري للمكان.</p>

  <p><strong>مستوى العناية:</strong> سهل ⭐</p>

  <p><strong>العناية:</strong> منتظم مع تجنب تجمع الماء</p>

  <p><strong>الإضاءة:</strong> ضوء غير مباشر</p>

  <p><strong>مميزات النبتة:</strong></p>

  <ul>
    <li>شكل عصري وجذاب</li>
    <li>سهلة العناية</li>
    <li>مناسبة للديكور</li>
  </ul>

  <p><strong>ملاحظة من "رواء":</strong> إذا الأوراق صغيرة، تحتاج ضوء أكثر 🌱</p>

  <a href="index.html">
   <button>رجوع </button>
  </a>
</div>

</body>
</html>
